<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Result</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1 class="header-title" style="margin:0;">Intracollege Sports</h1>
            <div class="module-title">Coordinator Portal</div>
        </div>
        <div class="glass-card">
            <h2>Add Result</h2>
            <form action="/coordinator/result/add" method="post">
                <div class="form-group">
                    <label>Event ID</label>
                    <input type="number" name="eventId" required/>
                </div>
                <div class="form-group">
                    <label>Winner Department Code</label>
                    <input type="text" name="winnerDept" required/>
                </div>
                <div class="form-group">
                    <label>Runner Department Code</label>
                    <input type="text" name="runnerDept" required/>
                </div>
                <button type="submit" class="btn-primary">Add Result</button>
            </form>
            <a href="/coordinator" class="back-link">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
