<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Fixtures</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1 class="header-title" style="margin:0;">Intracollege Sports</h1>
            <div class="module-title">Coordinator Portal</div>
        </div>
        <div class="glass-card">
            <h2>Create Fixtures</h2>
            <div th:if="${error}" class="text-danger" style="margin-bottom: 1rem; text-align: center; font-weight: bold;" th:text="${error}"></div>
            <form action="/coordinator/fixtures/create" method="post">
                <div class="form-group">
                    <label>Event ID</label>
                    <input type="number" name="eventId" required/>
                </div>
                <div class="form-group">
                    <label>Number of Matches</label>
                    <input type="number" id="numMatches" name="numMatches" onchange="generateMatchFields()" required/>
                </div>
                <div id="matches"></div>
                <button type="submit" class="btn-primary" style="margin-top:1rem;">Create Fixtures</button>
            </form>
            <a href="/coordinator" class="back-link">← Back to Dashboard</a>
        </div>
    </div>
    <script>
        function generateMatchFields() {
            var num = document.getElementById("numMatches").value;
            var div = document.getElementById("matches");
            div.innerHTML = "";
            for (var i = 1; i <= num; i++) {
                div.innerHTML += "<h3 style='margin-top:1.5rem;'>Match " + i + "</h3>";
                div.innerHTML += "<div class='form-group'><label>Dept 1</label><input type='text' name='dept1' required/></div>";
                div.innerHTML += "<div class='form-group'><label>Dept 2</label><input type='text' name='dept2' required/></div>";
            }
        }
    </script>
</body>
</html>
